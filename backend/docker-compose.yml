services:
  db:
    image: postgres:16-alpine
    container_name: meter-pulse-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: meter_pulse
      POSTGRES_USER: meter_pulse
      POSTGRES_PASSWORD: meter_pulse_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meter_pulse -d meter_pulse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
