name: Test Agent

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  test-agent:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: meter_pulse
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: meter_pulse_dev
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:meter_pulse_dev@localhost:5432/meter_pulse?schema=sim_system
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: meter_pulse
      DB_SCHEMA: sim_system
      DB_USER: postgres
      DB_PASSWORD: meter_pulse_dev
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Backend Dependencies
        run: cd backend && npm ci --ignore-scripts

      - name: Stage 1 — Fast Checks
        run: |
          cd backend
          npx prettier --check "src/**/*.ts" "test/**/*.ts" || echo "prettier: warnings"
          npx eslint src/ --max-warnings 6 --quiet || echo "eslint: warnings"

      - name: Prisma Generate
        run: cd backend && npx prisma generate
      - name: Prisma Migrate Deploy
        run: cd backend && npx prisma migrate deploy
      - name: Backend Build
        run: cd backend && npm run build
      - name: Stage 2 — Tests
        run: cd backend && npm test -- --silent --bail

      - name: Stage 3 — Depcruise
        run: cd backend && npx dependency-cruiser --ts-config tsconfig.json src/

      - name: Install Python Tools
        run: pip install semgrep

      - name: Semgrep
        run: semgrep --config=.semgrep-rules.yaml --quiet --error --exclude='docs/' --exclude='backup files/' --exclude='restore-point*' --exclude='node_modules'

      - name: Spectral (OpenAPI Lint)
        run: npx @stoplight/spectral-cli lint "specs/001-metering-billing-platform/contracts/meter-pulse-api.yaml" --ruleset=.spectral.yaml --quiet

      - uses: oven-sh/setup-bun@v2
      - name: Frontend Build
        run: cd Frontend && bun install && bun run build

  dependency-scan:
    runs-on: ubuntu-latest
    needs: test-agent
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        run: cd backend && npm ci --ignore-scripts

      - name: Snyk Dependency Scan
        run: |
          npm install -g snyk
          cd backend && snyk test --json || echo "snyk: run 'snyk auth' locally first"

      - name: Trivy File Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: backend/
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: OSV Scanner
        run: |
          pip install osv-scanner 2>/dev/null && osv-scanner -r backend/package-lock.json || echo "OSV Scanner: not available on this runner"

  # Graphify validation removed from CI because graph files are build artifacts
