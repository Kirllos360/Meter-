name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        ports: [5432:5432]
        env:
          POSTGRES_DB: meter_pulse
          POSTGRES_USER: meter_pulse
          POSTGRES_PASSWORD: meter_pulse_dev
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: backend/package-lock.json }
      - run: npm ci --ignore-scripts
      - run: npx prisma validate
      - run: npx prisma generate
      - run: npm run build
      - run: npm test
        env:
          DATABASE_URL: postgresql://meter_pulse:meter_pulse_dev@localhost:5432/meter_pulse?schema=sim_system
          JWT_SECRET: ci-test-secret
      - run: npm run lint
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint
      - run: bun run build

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: backend/package-lock.json }
      - run: npm ci --ignore-scripts
      - run: npm audit --audit-level=high || echo "Vulnerabilities found"
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      - uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-results.sarif') != ''
        with: { sarif_file: trivy-results.sarif }

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Generate backend SBOM
        run: |
          cd backend
          npm install --ignore-scripts --no-audit --no-fund 2>/dev/null
          npx --yes @cyclonedx/cyclonedx-npm --output-file ../sbom-backend.json
      - name: Generate frontend SBOM
        run: |
          cd Frontend
          npm install --ignore-scripts --no-audit --no-fund 2>/dev/null || echo "Frontend uses bun; SBOM requires bun install"
      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: sbom
          path: sbom-*.json

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with: { extra_args: --only-verified }
