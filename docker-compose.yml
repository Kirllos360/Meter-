services:
  db:
    image: postgres:16-alpine
    container_name: meter-verse-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-Meter_Verse_pulse}
      POSTGRES_USER: ${DB_USER:-Meter_Verse_pulse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Meter_Verse_pulse_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-Meter_Verse_pulse} -d ${DB_NAME:-Meter_Verse_pulse}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - meter-verse-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meter-verse-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      PORT: ${API_PORT:-3001}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-Meter_Verse_pulse}
      DB_SCHEMA: ${DB_SCHEMA:-sim_system}
      DB_USER: ${DB_USER:-Meter_Verse_pulse}
      DB_PASSWORD: ${DB_PASSWORD:-Meter_Verse_pulse_dev}
      DATABASE_URL: postgresql://${DB_USER:-Meter_Verse_pulse}:${DB_PASSWORD:-Meter_Verse_pulse_dev}@db:5432/${DB_NAME:-Meter_Verse_pulse}?schema=${DB_SCHEMA:-sim_system}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - meter-verse-net

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: meter-verse-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    depends_on:
      - backend
    networks:
      - meter-verse-net

networks:
  meter-verse-net:
    driver: bridge

volumes:
  pgdata:
